# 0 - off
# 1 - warning
# 2 - error

extends: ['next/core-web-vitals', 'standard', 'prettier']

rules:
  indent: [ 2, 'tab' ]
  no-tabs: [ 2, { allowIndentationTabs: true } ]
  space-before-function-paren: [2, 'never']
  react/jsx-filename-extension: [2, { extensions: ['.jsx'] }]
  react-hooks/exhaustive-deps: 2
